<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRIBE v2 · Neural Prediction Workstation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.min.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0c0c0e;
  --surface: #141416;
  --overlay: #1a1a1d;
  --border:  rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);

  --t1: #f0f0f2;
  --t2: #888892;
  --t3: #44444e;

  --ac:    #5b7fff;
  --ac-bg: rgba(91,127,255,0.1);
  --red:    #e05252;
  --green:  #3db870;
  --orange: #e07a42;

  --r-visual:     #e05252;
  --r-auditory:   #e07a42;
  --r-language:   #5b7fff;
  --r-prefrontal: #3db870;
  --r-motor:      #a855f7;
  --r-parietal:   #d4a429;

  --sans: 'Inter', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --r: 6px;
}

html, body {
  height: 100%;
  font-family: var(--sans);
  background: var(--bg);
  color: var(--t1);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ── LAYOUT ─────────────────────────── */
.shell { display: flex; flex-direction: column; height: 100vh; }

/* ── TOPBAR ─────────────────────────── */
.topbar {
  height: 44px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
  background: var(--bg);
  z-index: 10;
}
.brand {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: .05em;
  color: var(--t1);
  white-space: nowrap;
}
.brand-v { color: var(--t3); margin-left: 4px; font-size: 11px; }

.topbar-divider { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }

.topbar-mid {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
.view-chip {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .08em;
  color: var(--t3);
  padding: 3px 10px;
  border-radius: 20px;
  cursor: pointer;
  border: 1px solid transparent;
  user-select: none;
  transition: all .12s;
}
.view-chip:hover { color: var(--t2); border-color: var(--border); }
.view-chip.on { color: var(--t1); border-color: var(--border2); background: var(--overlay); }

.topbar-right { display: flex; align-items: center; gap: 6px; }
.icon-btn {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--r);
  border: 1px solid var(--border);
  color: var(--t3);
  cursor: pointer;
  font-size: 12px;
  user-select: none;
  transition: all .1s;
}
.icon-btn:hover { color: var(--t2); border-color: var(--border2); background: var(--overlay); }

/* ── MAIN ───────────────────────────── */
.main { flex: 1; position: relative; overflow: hidden; }

#brainCanvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

/* Loading overlay */
#loadingOverlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  z-index: 5;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--t3);
  letter-spacing: .06em;
}

/* ROI strip — left edge */
.roi-strip {
  position: absolute;
  left: 20px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 5px;
  z-index: 4;
}
.roi-row {
  display: flex;
  align-items: center;
  gap: 7px;
  cursor: pointer;
  opacity: 0.5;
  user-select: none;
  transition: opacity .12s;
}
.roi-row:hover { opacity: 0.85; }
.roi-row.on { opacity: 1; }
.roi-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.roi-name {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: .06em;
  color: var(--t2);
  text-transform: uppercase;
}

/* BOLD colorbar — right edge */
.cbar {
  position: absolute;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  z-index: 4;
}
.cbar-track {
  width: 6px;
  height: 100px;
  border-radius: 3px;
  background: linear-gradient(to bottom, #e05252, rgba(255,255,255,0.3), #3db870);
  opacity: 0.5;
}
.cbar-label {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--t3);
  letter-spacing: .04em;
}

/* Result card */
#resultCard {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--overlay);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 8px 16px;
  display: none;
  gap: 18px;
  white-space: nowrap;
  z-index: 4;
  align-items: center;
}
#resultCard.visible { display: flex; }
.rc-stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.rc-val {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 500;
  color: var(--t1);
}
.rc-key {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--t3);
  letter-spacing: .06em;
  text-transform: uppercase;
}

/* Info slide-in panel */
#infoPanel {
  position: absolute;
  top: 0; right: 0; bottom: 0;
  width: 280px;
  background: var(--surface);
  border-left: 1px solid var(--border);
  z-index: 20;
  display: none;
  flex-direction: column;
  padding: 16px;
  gap: 12px;
  overflow-y: auto;
}
#infoPanel.open { display: flex; }
.info-title {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .08em;
  color: var(--t3);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.enc-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.enc-name { font-family: var(--mono); font-size: 11px; color: var(--t2); }
.enc-status {
  font-family: var(--mono);
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 4px;
}
.enc-status.loaded { color: #3db870; }
.enc-status.missing { color: var(--t3); }
.dl-btn {
  width: 100%;
  padding: 6px 12px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  color: var(--t2);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .06em;
  cursor: pointer;
  text-align: center;
  transition: all .1s;
  margin-top: 4px;
}
.dl-btn:hover { color: var(--t1); border-color: var(--border2); background: var(--overlay); }
.dl-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.dl-progress {
  height: 2px;
  background: var(--border);
  border-radius: 1px;
  margin-top: 4px;
  overflow: hidden;
  display: none;
}
.dl-progress.active { display: block; }
.dl-progress-fill {
  height: 100%;
  background: var(--ac);
  width: 0%;
  transition: width .2s;
}
.info-sep { height: 1px; background: var(--border); }

/* ── BOTTOM BAR ─────────────────────── */
.bottom-bar {
  border-top: 1px solid var(--border);
  padding: 10px 16px 12px;
  background: var(--bg);
  flex-shrink: 0;
  z-index: 10;
}
.mode-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}
.mode-tab {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .10em;
  color: var(--t3);
  padding: 4px 14px 6px;
  cursor: pointer;
  border-bottom: 1.5px solid transparent;
  margin-bottom: -1px;
  user-select: none;
  transition: all .1s;
}
.mode-tab:hover { color: var(--t2); }
.mode-tab.on { color: var(--t1); border-bottom-color: var(--ac); }

/* File chip (shown when file attached) */
#fileChip {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 5px 10px 5px 8px;
  background: var(--overlay);
  border: 1px solid var(--border2);
  border-radius: 6px;
  margin-bottom: 8px;
}
#fileChip.visible { display: flex; }
.fc-ext {
  font-family: var(--mono);
  font-size: 9px;
  background: var(--ac-bg);
  color: var(--ac);
  padding: 2px 5px;
  border-radius: 3px;
  letter-spacing: .04em;
  flex-shrink: 0;
}
.fc-name { font-family: var(--mono); font-size: 11px; color: var(--t2); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.fc-size { font-family: var(--mono); font-size: 10px; color: var(--t3); flex-shrink: 0; }
.fc-rm { color: var(--t3); cursor: pointer; font-size: 12px; flex-shrink: 0; padding: 0 2px; }
.fc-rm:hover { color: var(--t1); }

.input-row {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  transition: border-color .1s;
}
.input-row.drag-over { border-color: var(--ac); border-style: dashed; }
.input-row:focus-within { border-color: var(--border2); }

#textInput {
  flex: 1;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--t2);
  background: transparent;
  border: none;
  outline: none;
  resize: none;
  line-height: 1.5;
  min-height: 18px;
  max-height: 120px;
}
#textInput::placeholder { color: var(--t3); }

.dz-msg {
  flex: 1;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--t3);
  pointer-events: none;
}

.seq-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--t3);
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
}
.seq-label:hover { color: var(--t2); }

.input-sep { width: 1px; height: 16px; background: var(--border); flex-shrink: 0; }

.run-btn {
  height: 28px;
  padding: 0 16px;
  background: var(--ac);
  border-radius: 5px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
  letter-spacing: .01em;
  cursor: pointer;
  user-select: none;
  border: none;
  transition: opacity .1s;
}
.run-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.run-btn.cancelling {
  background: transparent;
  border: 1px solid rgba(224,82,82,0.3);
  color: var(--red);
}
.kbd {
  font-size: 9px;
  opacity: 0.55;
  background: rgba(255,255,255,0.15);
  border-radius: 3px;
  padding: 1px 5px;
  font-family: var(--mono);
}

/* Infer progress track (inside bottom bar, below input-row) */
#inferTrack {
  height: 2px;
  background: var(--border);
  border-radius: 1px;
  margin-top: 8px;
  display: none;
  overflow: hidden;
}
#inferTrack.active { display: block; }
#inferFill {
  height: 100%;
  background: var(--ac);
  width: 0%;
  transition: width .3s;
}
</style>
</head>
<body>
<div class="shell">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="brand">TRIBE<span class="brand-v">v2</span></div>
    <div class="topbar-divider"></div>
    <div class="topbar-mid">
      <div class="view-chip on" id="vc-lateral" onclick="setCamView('lateral')">LATERAL</div>
      <div class="view-chip" id="vc-medial" onclick="setCamView('medial')">MEDIAL</div>
      <div class="view-chip" id="vc-dorsal" onclick="setCamView('dorsal')">DORSAL</div>
    </div>
    <div class="topbar-right">
      <div class="icon-btn" title="Export" onclick="exportResults()">&#x2193;</div>
      <div class="icon-btn" id="infoBtn" title="Info" onclick="toggleInfoPanel()">?</div>
    </div>
  </div>

  <!-- MAIN BRAIN AREA -->
  <div class="main" id="mainArea">
    <canvas id="brainCanvas"></canvas>
    <div id="regionLabels" style="position:absolute;inset:0;pointer-events:none;overflow:hidden;"></div>

    <!-- Loading overlay -->
    <div id="loadingOverlay">LOADING BRAIN MESH&#x2026;</div>

    <!-- ROI strip — left edge -->
    <div class="roi-strip">
      <div class="roi-row on" data-r="visual"     onclick="toggleROI(this)">
        <div class="roi-dot" style="background:var(--r-visual);"></div>
        <div class="roi-name">Visual</div>
      </div>
      <div class="roi-row on" data-r="auditory"   onclick="toggleROI(this)">
        <div class="roi-dot" style="background:var(--r-auditory);"></div>
        <div class="roi-name">Auditory</div>
      </div>
      <div class="roi-row on" data-r="language"   onclick="toggleROI(this)">
        <div class="roi-dot" style="background:var(--r-language);"></div>
        <div class="roi-name">Language</div>
      </div>
      <div class="roi-row on" data-r="prefrontal" onclick="toggleROI(this)">
        <div class="roi-dot" style="background:var(--r-prefrontal);"></div>
        <div class="roi-name">Prefrontal</div>
      </div>
      <div class="roi-row on" data-r="motor"      onclick="toggleROI(this)">
        <div class="roi-dot" style="background:var(--r-motor);"></div>
        <div class="roi-name">Motor</div>
      </div>
      <div class="roi-row on" data-r="parietal"   onclick="toggleROI(this)">
        <div class="roi-dot" style="background:var(--r-parietal);"></div>
        <div class="roi-name">Parietal</div>
      </div>
    </div>

    <!-- BOLD colorbar — right edge -->
    <div class="cbar">
      <div class="cbar-label">+</div>
      <div class="cbar-track"></div>
      <div class="cbar-label">&#x2212;</div>
    </div>

    <!-- Result card (shown after prediction) -->
    <div id="resultCard"></div>

    <!-- Info slide-in panel -->
    <div id="infoPanel">
      <div class="info-title">Encoders</div>

      <!-- LLaMA -->
      <div>
        <div class="enc-row">
          <div class="enc-name">LLaMA (text)</div>
          <div class="enc-status missing" id="llamaStatus">not loaded</div>
        </div>
        <button class="dl-btn" id="dlLlama" onclick="startDownload('llama')">Download</button>
        <div class="dl-progress" id="dlLlamaProgress">
          <div class="dl-progress-fill" id="dlLlamaFill"></div>
        </div>
      </div>

      <div class="info-sep"></div>

      <!-- CLIP -->
      <div>
        <div class="enc-row">
          <div class="enc-name">CLIP (image)</div>
          <div class="enc-status missing" id="clipStatus">not loaded</div>
        </div>
        <button class="dl-btn" id="dlClip" onclick="startDownload('clip')">Download</button>
        <div class="dl-progress" id="dlClipProgress">
          <div class="dl-progress-fill" id="dlClipFill"></div>
        </div>
      </div>

      <div class="info-sep"></div>

      <!-- Wav2Vec -->
      <div>
        <div class="enc-row">
          <div class="enc-name">Wav2Vec (audio)</div>
          <div class="enc-status missing" id="wav2vecStatus">not loaded</div>
        </div>
        <button class="dl-btn" id="dlWav2vec" onclick="startDownload('wav2vec')">Download</button>
        <div class="dl-progress" id="dlWav2vecProgress">
          <div class="dl-progress-fill" id="dlWav2vecFill"></div>
        </div>
      </div>
    </div>

    <!-- Hidden compatibility stubs (preserve old JS IDs) -->
    <div id="statusBar"      style="display:none;"></div>
    <div id="resultPanel"    style="display:none;"></div>
    <div id="comparePanel"   style="display:none;"></div>
    <div id="sessionId"      style="display:none;"></div>
    <div id="demoMode"       style="display:none;"></div>
    <span id="sessionName"       style="display:none;"></span>
    <div  id="infoModalBackdrop" style="display:none;"></div>
  </div>

  <!-- BOTTOM INPUT BAR -->
  <div class="bottom-bar">
    <!-- Mode tabs -->
    <div class="mode-tabs">
      <div class="mode-tab on" id="tab-text"  onclick="selStim('text')">TEXT</div>
      <div class="mode-tab"    id="tab-image" onclick="selStim('image')">IMAGE</div>
      <div class="mode-tab"    id="tab-audio" onclick="selStim('audio')">AUDIO</div>
    </div>

    <!-- File chip (image/audio mode) -->
    <div id="fileChip">
      <span class="fc-ext" id="fcExt"></span>
      <span class="fc-name" id="fcName"></span>
      <span class="fc-size" id="fcSize"></span>
      <span class="fc-rm" onclick="clearInput()">&#x2715;</span>
    </div>

    <!-- Input row -->
    <div class="input-row" id="inputRow">
      <!-- Text mode -->
      <textarea id="textInput" rows="1" placeholder="Describe a stimulus&#x2026;" oninput="autoResize(this)"></textarea>
      <!-- Image drop zone msg (hidden when text active) -->
      <div class="dz-msg" id="dzImage" style="display:none;">Drop an image file here</div>
      <!-- Audio drop zone msg -->
      <div class="dz-msg" id="dzAudio" style="display:none;">Drop an audio file here</div>

      <!-- Seq control -->
      <div class="seq-label" id="seqLabel" onclick="cycleSeq()">seq 16</div>
      <div class="input-sep"></div>
      <!-- Run button -->
      <button class="run-btn" id="runBtn" onclick="runOrCancel()">Run <span class="kbd">&#x21B5;</span></button>
    </div>

    <!-- Infer progress track -->
    <div id="inferTrack"><div id="inferFill"></div></div>
  </div>

</div>
<script>
const SUBTYPES = {
  text:  [{v:'narrative',label:'Narrative / Prose'},{v:'poetry',label:'Poetry / Literary'},{v:'technical',label:'Technical / Scientific'},{v:'sentences',label:'Isolated Sentences'}],
  image: [{v:'natural_scenes',label:'Natural Scenes'},{v:'faces',label:'Human Faces'},{v:'objects',label:'Object Arrays'},{v:'abstract',label:'Abstract / Non-objects'},{v:'text_images',label:'Text-embedded Images'}],
  video: [{v:'movie_clips',label:'Naturalistic Movie Clips'},{v:'nature',label:'Nature / Documentary'},{v:'social',label:'Social Interaction'},{v:'action',label:'Motor / Action Sequences'}],
  audio: [{v:'podcast',label:'Podcast / Narrative Speech'},{v:'music',label:'Music / Tonal'},{v:'ambient',label:'Ambient / Environmental'},{v:'speech_noise',label:'Speech-in-Noise'}],
};
const RNAMES_FULL = {
  visual:'visual cortex (V1-V4, occipital)', auditory:'auditory cortex (primary STG)',
  language:"language network (BA44, BA22)", prefrontal:'prefrontal cortex (dlPFC, vmPFC)',
  motor:'motor cortex (M1, premotor)', parietal:'parietal cortex (IPS, SPL)',
};
const RNAMES_SHORT = { visual:'visual', auditory:'auditory', language:'language', prefrontal:'prefrontal', motor:'motor', parietal:'parietal' };
const TASK_LBL = { passive:'passive_viewing', attention:'sustained_attention', memory:'working_memory', comprehension:'semantic_comprehension' };
const STIM_ENCODER = { text:'llama32_3b', image:'vjepa2', video:'vjepa2_temporal', audio:'wav2vec_bert2' };

// ── Educational region descriptions ──────────────────────────
const REGION_EDU = {
  visual: {
    fullName: 'Visual Cortex',
    lobe: 'Occipital lobe',
    ba: 'BA 17, 18, 19 · V1 → V4 · MT/V5',
    color: 'var(--r-visual)',
    subregions: ['V1 — orientation & edges','V2/V3 — intermediate','V4 — color & form','MT/V5 — motion'],
    what: 'The visual cortex sits at the back of your skull and is the first cortical stop for everything your eyes see. It processes information in a strict hierarchy: V1 detects raw edges and gratings; V2 and V3 refine those into contours and surfaces; V4 combines them into colored shapes and objects; MT/V5 detects motion and optic flow. Two streams then carry information forward — the <em>ventral stream</em> ("what") toward the temporal lobe for object recognition, and the <em>dorsal stream</em> ("where/how") toward parietal cortex for spatial control.',
    stimText:  'During naturalistic text reading, your visual cortex processes the word shapes before language areas parse their meaning. Sentences with strong visual imagery ("the red sunset over still water") produce broader activation than abstract prose.',
    stimAudio: 'Auditory stimuli typically suppress visual cortex, but narrative speech with vivid imagery can trigger weak activation via top-down mental imagery.',
    stimVideo: 'Visual cortex is maximally driven by video — every frame triggers the full V1→MT cascade, with MT/V5 especially active during camera movement.',
  },
  auditory: {
    fullName: 'Auditory Cortex',
    lobe: 'Superior temporal gyrus (STG)',
    ba: 'BA 41, 42, 22 · A1 (Heschl\'s gyrus) + belt',
    color: 'var(--r-auditory)',
    subregions: ['Heschl\'s gyrus — pure tone map','Auditory belt — complex sounds','Posterior STG — Wernicke\'s area','Right STG — music & prosody'],
    what: 'Tucked inside the lateral sulcus on the temporal lobe, the auditory cortex is organized as a <em>tonotopic map</em>: neurons tuned to low frequencies sit at one end, high frequencies at the other — like a piano laid across the surface of your brain. The core (A1, Heschl\'s gyrus) responds to simple tones. The surrounding belt and parabelt regions respond to complex sounds, speech phonemes, and auditory objects. The posterior part of the left STG is Wernicke\'s area, critical for understanding spoken words. The right hemisphere is dominant for music, rhythm, and emotional tone of speech (prosody).',
    stimText:  'Pure text reading produces minimal auditory cortex activation unless you subvocalize. Inner speech (mentally "hearing" words) drives weak left STG activation.',
    stimAudio: 'The primary driver of auditory cortex. Speech activates bilateral STG, with left dominant for phonemes; music activates bilateral with right dominance for pitch and timbre.',
    stimVideo: 'Co-activates with visual cortex when the video has speech or music. The brain integrates lip movement (visual) with phoneme representation (auditory) in the posterior STG.',
  },
  language: {

// ── Insight level label ───────────────────────────────────────
function _insightLevel(rel) {
  if (rel >= 0.5)  return { cls:'high', txt:'Strongly active' };
  if (rel >= 0.15) return { cls:'mid',  txt:'Moderately active' };
  if (rel >= -0.15) return { cls:'low', txt:'Baseline' };
  return { cls:'supp', txt:'Suppressed' };
}

// ── Build and show insight panel ──────────────────────────────
function _updateInsight(data) {
  const panel   = document.getElementById('insightPanel');
  const summary = document.getElementById('insightSummary');
  const cards   = document.getElementById('insightCards');
  if (!panel) return;

  const rs = data.region_stats;
  const activeRegs = ST.regions;
  const stim = data.modality || ST.stim;

  // Rank active regions by rel_activation descending
  const ranked = activeRegs
    .filter(r => rs[r])
    .map(r => ({ r, rel: rs[r].rel_activation ?? 0 }))
    .sort((a, b) => b.rel - a.rel);

  if (!ranked.length) { panel.classList.remove('visible'); return; }

  const top = ranked[0];
  const edu = REGION_EDU[top.r];
  const topName = edu ? edu.fullName : top.r;
  const lvl = _insightLevel(top.rel);
  const sign = top.rel >= 0 ? '+' : '';

  // Summary line
  summary.innerHTML = `<strong>${topName}</strong> shows the strongest response (${sign}${top.rel.toFixed(2)}σ above brain mean). ` +
    (edu
      ? (stim === 'audio' ? edu.stimAudio : stim.includes('video') ? edu.stimVideo : edu.stimText)
      : 'See region cards below for details.');

  // Per-region cards
  cards.innerHTML = ranked.map(({ r, rel }) => {
    const e  = REGION_EDU[r];
    const s  = rs[r];
    if (!e) return '';
    const lv = _insightLevel(rel);
    const sg = rel >= 0 ? '+' : '';
    const stimTxt = stim === 'audio' ? e.stimAudio : stim.includes('video') ? e.stimVideo : e.stimText;
    const peak  = s?.peak   != null ? s.peak.toFixed(3)   : '—';
    const std   = s?.std    != null ? s.std.toFixed(3)     : '—';
    const nv    = s?.n_vertices != null ? s.n_vertices.toLocaleString() : '—';
    const mn    = s?.mean   != null ? (s.mean>=0?'+':'')+s.mean.toFixed(3) : '—';
    return `<div class="icard">
      <div class="icard-head">
        <div class="icard-dot" style="background:${e.color}"></div>
        <span class="icard-name">${e.fullName}</span>
        <span class="icard-rel" style="color:${rel>=0.15?'var(--green)':rel<-0.15?'var(--orange)':'var(--t3)'}">${sg}${rel.toFixed(2)}σ</span>
        <span class="icard-lvl ${lv.cls}">${lv.txt}</span>
      </div>
      <div class="icard-body">
        <div class="icard-anatomy">
          <span class="icard-atom">${e.lobe}</span>
          <span class="icard-atom">${e.ba}</span>
        </div>
        <div class="icard-statrow">
          <span class="icard-stat">μ <strong>${mn}</strong></span>
          <span class="icard-stat">σ <strong>${std}</strong></span>
          <span class="icard-stat">peak <strong>${peak}</strong></span>
          <span class="icard-stat"><strong>${nv}</strong> vertices</span>
        </div>
        <div class="icard-explain">${e.what}</div>
        <div class="icard-explain" style="border-top:1px solid var(--border);padding-top:6px;margin-top:2px;font-size:11px;color:var(--t3)">
          <strong style="color:var(--t2)">For this stimulus:</strong> ${stimTxt}
        </div>
        <div class="icard-subs">${e.subregions.map(s=>`<span class="icard-sub">${s}</span>`).join('')}</div>
      </div>
    </div>`;
  }).join('');

  panel.classList.add('visible');
}

function init() { populateSubs(ST.stim); updateAll(); }

function selStim(mode) {
  ST.stim = mode;
  ['text','image','audio'].forEach(m => {
    document.getElementById('tab-' + m).classList.toggle('on', m === mode);
  });
  document.getElementById('textInput').style.display  = mode === 'text'  ? '' : 'none';
  document.getElementById('dzImage').style.display    = mode === 'image' ? '' : 'none';
  document.getElementById('dzAudio').style.display    = mode === 'audio' ? '' : 'none';
  clearInput();
  populateSubs(mode);
  updateAll();
}

function populateSubs(s) {
  const sel = document.getElementById('subtypeSelect');
  if (sel) {
    while (sel.firstChild) sel.removeChild(sel.firstChild);
    SUBTYPES[s].forEach(o => { const e=document.createElement('option'); e.value=o.v; e.textContent=o.label; sel.appendChild(e); });
  }
  if (SUBTYPES[s] && SUBTYPES[s][0]) ST.subtype = SUBTYPES[s][0].v;
  const T={text:'Stimulus Category (Text)',image:'Stimulus Category (Image)',video:'Stimulus Category (Video)',audio:'Stimulus Category (Audio)'};
  const subtypeLbl = document.getElementById('subtypeLabel');
  if (subtypeLbl) subtypeLbl.textContent = T[s];
}

function toggleR(r) {
  const i=ST.regions.indexOf(r);
  if (i===-1) ST.regions.push(r); else if (ST.regions.length>1) ST.regions.splice(i,1);
  updateAll();
}

function selTask(t) {
  ST.task=t;
  document.querySelectorAll('[data-task]').forEach(c=>c.classList.toggle('on',c.dataset.task===t));
  updateAll();
}

function flipTog(k) {
  if (k==='zeroshot') { ST.zeroshot=!ST.zeroshot; const el=document.getElementById('togZS'); if(el) el.classList.toggle('on',ST.zeroshot); }
  else               { ST.crosslang=!ST.crosslang; const el=document.getElementById('togCL'); if(el) el.classList.toggle('on',ST.crosslang); }
  updateAll();
}

function _showFileChip(file) {
  const ext = (file.name.split('.').pop() || '').toUpperCase();
  const kb  = (file.size / 1024).toFixed(0);
  const mb  = (file.size / 1048576).toFixed(1);
  const sz  = file.size > 1048576 ? mb + ' MB' : kb + ' KB';
  document.getElementById('fcExt').textContent  = ext;
  document.getElementById('fcName').textContent = file.name;
  document.getElementById('fcSize').textContent = sz;
  document.getElementById('fileChip').classList.add('visible');
}

function handleFile(input, type) {
  const file=input.files[0]; if (!file) return;
  ST.fileName=file.name;
  _currentFile = file;
  if (_blobUrls[type]) { URL.revokeObjectURL(_blobUrls[type]); }
  const url = URL.createObjectURL(file);
  _blobUrls[type] = url;
  _showFileChip(file);
  updateAll();
  // Auto-run prediction when a stimulus file is loaded
  if (type === 'audio' || type === 'image' || type === 'video') setTimeout(runPrediction, 200);
}

function loadVideoUrl() {
  const url=document.getElementById('videoUrl').value.trim(); if (!url) return;
  ST.videoUrl=url;
  if (!url.includes('youtube')) {
    const vid=document.getElementById('videoPreview'); if(vid){vid.src=url; vid.style.display='block';}
    const dzvi=document.getElementById('dz-video-inner'); if(dzvi) dzvi.style.display='none';
    const dzvid=document.getElementById('dz-video'); if(dzvid) dzvid.classList.add('has-content');
    showBadge('video', url.split('/').pop().substring(0,36));
  } else { showBadge('video','[external URL]'); }
  updateAll();
}

function showBadge(p,name) {
  const n=name.length>36?name.substring(0,36)+'…':name;
  const b=document.getElementById(p+'-badge'); if(b){b.textContent=n; b.style.display='block';}
  const c=document.getElementById(p+'-clear'); if(c) c.style.display='flex';
}

function clearInput(type) {
  document.getElementById('fileChip').classList.remove('visible');
  document.getElementById('fcExt').textContent  = '';
  document.getElementById('fcName').textContent = '';
  document.getElementById('fcSize').textContent = '';
  if (!type) return;
  const p=type==='image'?'img':type; ST.fileName=''; ST.videoUrl='';
  document.getElementById(p+'-badge').style.display='none';
  const cb=document.getElementById(p+'-clear'); if(cb) cb.style.display='none';
  document.getElementById('dz-'+type).classList.remove('has-content');

  if (type==='image') { const i=document.getElementById('imgPreview');if(i){i.src='';i.style.display='none';} const dii=document.getElementById('dz-image-inner');if(dii)dii.style.display=''; }
  else if (type==='video') { const v=document.getElementById('videoPreview');if(v){v.src='';v.style.display='none';} const dvi=document.getElementById('dz-video-inner');if(dvi)dvi.style.display=''; const vurl=document.getElementById('videoUrl');if(vurl)vurl.value=''; }
  else if (type==='audio') { const a=document.getElementById('audioPreview');if(a){a.src='';a.style.display='none';} const aw=document.getElementById('audioWave');if(aw)aw.classList.remove('active'); const dai=document.getElementById('dz-audio-inner');if(dai)dai.style.display=''; }

}

function updateAll() {
  const subjectSlider = document.getElementById('subjectSlider');
  if (subjectSlider) ST.subjects = +subjectSlider.value;
  const confSlider = document.getElementById('confSlider');
  if (confSlider) ST.confidence = +confSlider.value/100;
  const subtypeSelect = document.getElementById('subtypeSelect');
  if (subtypeSelect) ST.subtype = subtypeSelect.value;
  const textInputVal = document.getElementById('textInput');
  if (textInputVal) ST.textContent = textInputVal.value.trim();

  const len = textInputVal ? textInputVal.value.length : 0;
  const charCount = document.getElementById('charCount');
  if (charCount) charCount.textContent = len.toLocaleString()+' chars';
  const tokenEst = document.getElementById('tokenEst');
  if (tokenEst) tokenEst.textContent = '~'+Math.ceil(len/4)+' tokens';

  // ROI rows (both panels)
  const allRois = ['visual','auditory','language','prefrontal','motor','parietal'];
  allRois.forEach(r => {
    const on = ST.regions.includes(r);
    document.querySelectorAll('[data-r="'+r+'"]').forEach(el => el.classList.toggle('on', on));
    // Update status cell only; pearson/mean/std are set by _applyResult after inference
    const st = document.getElementById('st-' + r);
    if (st && st.textContent !== 'ON' && st.textContent !== 'off') return;
    if (st) { st.textContent = on ? 'ON' : 'off'; st.style.color = on ? 'var(--green)' : 'var(--t3)'; }
  });

  const n = ST.regions.length;
  const roiCount = document.getElementById('roiCount');
  if (roiCount) roiCount.textContent = n+' active';
  const roiBadge = document.getElementById('roiBadge');
  if (roiBadge) roiBadge.textContent = n+' / 6';

  if (window.updateBrainRegions) window.updateBrainRegions(ST.regions);
}

function applyPreset(name) {
  const P={
    visual:     {stim:'image',sub:'natural_scenes',regions:['visual','parietal'],                       subjects:24,zeroshot:false,crosslang:false,resolution:70,confidence:.90,task:'passive'},
    language:   {stim:'text', sub:'narrative',     regions:['language','prefrontal','auditory'],         subjects:18,zeroshot:false,crosslang:true, resolution:70,confidence:.87,task:'comprehension'},
    auditory:   {stim:'audio',sub:'podcast',       regions:['auditory','language'],                      subjects:15,zeroshot:false,crosslang:false,resolution:65,confidence:.82,task:'passive'},
    multimodal: {stim:'video',sub:'movie_clips',   regions:['visual','auditory','language','prefrontal'],subjects:50,zeroshot:false,crosslang:false,resolution:70,confidence:.88,task:'attention'},
    zeroshot:   {stim:'image',sub:'faces',         regions:['visual','prefrontal','parietal'],           subjects:5, zeroshot:true, crosslang:false,resolution:55,confidence:.75,task:'passive'},
  };
  const p=P[name]; if(!p) return;
  ST.regions=[...p.regions]; ST.zeroshot=p.zeroshot; ST.crosslang=p.crosslang;
  ST.resolution=p.resolution; ST.confidence=p.confidence; ST.task=p.task;
  selStim(p.stim);
  setTimeout(()=>{ const ss=document.getElementById('subtypeSelect'); if(ss){ss.value=p.sub;} ST.subtype=p.sub; },0);
  const aSlider=document.getElementById('subjectSlider'); if(aSlider) aSlider.value=p.subjects;
  const aVal=document.getElementById('subjectVal'); if(aVal) aVal.textContent=p.subjects;
  const apTogZS=document.getElementById('togZS'); if(apTogZS) apTogZS.classList.toggle('on',p.zeroshot);
  const apTogCL=document.getElementById('togCL'); if(apTogCL) apTogCL.classList.toggle('on',p.crosslang);
  const apRSlider=document.getElementById('resSlider'); if(apRSlider) apRSlider.value=p.resolution;
  const apRVal=document.getElementById('resVal'); if(apRVal) apRVal.textContent=p.resolution+'\u00d7';
  const apCSlider=document.getElementById('confSlider'); if(apCSlider) apCSlider.value=Math.round(p.confidence*100);
  const apCVal=document.getElementById('confVal'); if(apCVal) apCVal.textContent=p.confidence.toFixed(2);
  selTask(p.task);
  document.querySelectorAll('.tpl-btn').forEach(b=>b.classList.toggle('on',b.getAttribute('onclick').includes("'"+name+"'")));
  updateAll();
}

    btn.textContent = 'Cancel';

    track.classList.remove('active');

function _setStatus(running) {
  const prog = document.getElementById('inferProgress');
  if (prog) prog.style.display = running ? 'block' : 'none';
  const btn = document.querySelector('.run-btn');
  if (btn) btn.classList.toggle('inferring', running);
  const cancel = document.getElementById('cancelBtn');
  if (cancel) cancel.style.display = running ? 'flex' : 'none';
  const lbl = document.getElementById('inferStepLabel');
  if (lbl) { if (!running) { lbl.classList.remove('visible'); lbl.textContent = ''; } }
}

function cancelPrediction() {
  if (!_predRunning) return;
  _predRunning = false;
  _setStatus(false);
  _setRunning(false);
  const bar = document.getElementById('inferBar');
  if (bar) bar.style.width = '0%';
  // Close WS to flush in-flight response; auto-reconnect fires in 2 s
  if (_ws) _ws.close();
}

function _animateBar(bar, targetPct, durationMs) {
  const start = performance.now();
  const from = parseFloat(bar.style.width) || 0;
  function step(now) {
    const t = Math.min((now - start) / durationMs, 1);
    bar.style.width = (from + (targetPct - from) * t) + '%';
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ── APPLY INFERENCE RESULT ────────────────────────────────────
function _applyResult(data) {
  _lastResult = data;
  // Show Pin A button after first result
  const pinBtn = document.getElementById('vt-pin');
  if (pinBtn) pinBtn.style.display = '';

  const rois = ['visual','auditory','language','prefrontal','motor','parietal'];
  const rs = data.region_stats;

  // Update ROI stats table
  rois.forEach(r => {
    const s   = rs[r];
    const onR = ST.regions.includes(r);
    const st  = document.getElementById('st-' + r);
    const pr  = document.getElementById('pr-' + r);
    const mn  = document.getElementById('mn-' + r);
    const sd  = document.getElementById('sd-' + r);
    const pk  = document.getElementById('pk-' + r);
    if (!st) return;
    if (onR && s) {
      const rel = s.rel_activation ?? 0;
      pr.textContent = (rel >= 0 ? '+' : '') + rel.toFixed(2);
      pr.style.color = rel > 0.3 ? 'var(--green)' : rel < -0.3 ? 'var(--orange)' : 'var(--t2)';
      mn.textContent = (s.mean >= 0 ? '+' : '') + s.mean.toFixed(3);
      sd.textContent = s.std.toFixed(3);
      if (pk) pk.textContent = s.peak != null ? s.peak.toFixed(3) : '—';
      st.textContent = 'ON'; st.style.color = 'var(--green)';
    } else {
      pr.textContent = '—'; mn.textContent = '—'; sd.textContent = '—';
      if (pk) pk.textContent = '—';
      st.textContent = 'off'; st.style.color = 'var(--t3)'; pr.style.color = '';
    }
  });

  // Prediction metadata badge
  const predMeta = document.getElementById('predMeta');
  const pmSeq    = document.getElementById('pmSeq');
  const pmTime   = document.getElementById('pmTime');
  const pmMod    = document.getElementById('pmMod');
  if (predMeta) {
    if (pmSeq)  pmSeq.textContent  = (data.seq_len ?? '—') + ' TR';
    if (pmTime) pmTime.textContent = data.elapsed_ms != null ? data.elapsed_ms.toFixed(0) + ' ms' : '—';
    if (pmMod)  pmMod.textContent  = data.modality || '—';
    predMeta.classList.add('visible');
  }

  // Show colorbar
  const cb = document.getElementById('bColorbar');
  if (cb) cb.classList.add('visible');
  const cbRange = document.getElementById('cbRangeLine');
  if (cbRange && data.global_stats) {
    const gs = data.global_stats;
    cbRange.textContent = '[' + gs.global_min.toFixed(3) + ', ' + gs.global_max.toFixed(3) + ']  20,484v';
  }

  // Demo banner
  const banner = document.getElementById('demoBanner');
  if (banner) banner.style.display = data.demo_mode ? '' : 'none';

  // Drive per-vertex brain coloring from full 20484-vertex activation vector
  if (window.setBrainVertexSample) {
    const verts = data.vertex_acts?.length > 0 ? data.vertex_acts : data.vertex_sample;
    if (verts?.length > 0) {
      window.setBrainVertexSample(
        verts,
        data.global_stats.global_min,
        data.global_stats.global_max,
        ST.regions,
        data.region_stats
      );
    }
  }

  // Update label activation bars on 3D brain
  if (window.updateLabelActivations) updateLabelActivations(data.region_stats);

  // Drive breathing + glow from prediction results
  if (window.setBreathing) window.setBreathing(data.region_stats, ST.regions);
  if (window.setRegionGlow) window.setRegionGlow(data.region_stats, ST.regions);

  // Update educational insight panel
  _updateInsight(data);

  // Update result card
  _showResultCard(data);

  // Update comparison panel if A is pinned
  if (_pinnedA) _showComparison(_pinnedA, data);

  // Temporal animation
  if (data.temporal_acts?.length > 0) {
    clearInterval(_temporalTimer);
    _temporalPlaying = false;
    _temporalFrame   = 0;
    _temporalActs    = data.temporal_acts;
    const btn = document.getElementById('vt-temporal');
    if (btn) { btn.style.display = ''; btn.textContent = '\u25B6 TR'; btn.classList.remove('on'); }
    const scrubber = document.getElementById('temporalScrubber');
    if (scrubber) { scrubber.max = data.temporal_acts.length - 1; scrubber.value = 0; }
    const lbl = document.getElementById('temporalFrameLbl');
    if (lbl) lbl.textContent = 'TR 1 / ' + data.temporal_acts.length;
    const ctrl = document.getElementById('temporalControls');
    if (ctrl) ctrl.style.display = 'flex';
  }
}

// ── RESULT CARD ───────────────────────────────────────────────
function _showResultCard(resp) {
  const regionNames  = ['Visual','Auditory','Language','Prefrontal','Motor','Parietal'];
  const regionColors = ['var(--r-visual)','var(--r-auditory)','var(--r-language)','var(--r-prefrontal)','var(--r-motor)','var(--r-parietal)'];

  const acts = resp.temporal_acts;
  if (!acts || acts.length === 0) return;

  const T = acts.length;
  const means = Array(6).fill(0);
  acts.forEach(row => { if (row) row.forEach((v, i) => { means[i] += v; }); });
  means.forEach((_, i) => { means[i] /= T; });

  const sorted = means.map((v, i) => ({ v, i })).sort((a, b) => b.v - a.v).slice(0, 3);

  const card = document.getElementById('resultCard');
  if (!card) return;
  while (card.firstChild) card.removeChild(card.firstChild);

  sorted.forEach(({ v, i }) => {
    const stat = document.createElement('div');
    stat.className = 'rc-stat';
    const val = document.createElement('div');
    val.className = 'rc-val';
    val.style.color = regionColors[i];
    val.textContent = v.toFixed(2);
    const key = document.createElement('div');
    key.className = 'rc-key';
    key.textContent = regionNames[i];
    stat.appendChild(val);
    stat.appendChild(key);
    card.appendChild(stat);
  });

  if (resp.infer_ms != null) {
    const stat = document.createElement('div');
    stat.className = 'rc-stat';
    const val = document.createElement('div');
    val.className = 'rc-val';
    val.textContent = Math.round(resp.infer_ms).toString();
    const key = document.createElement('div');
    key.className = 'rc-key';
    key.textContent = 'ms';
    stat.appendChild(val);
    stat.appendChild(key);
    card.appendChild(stat);
  }

  card.classList.add('visible');
}

// ── Comparison state ──────────────────────────────────────────
let _lastResult  = null;
let _pinnedA     = null;
let _diffActive  = false;
let _temporalActs    = null;   // [T][6] from server
let _temporalFrame   = 0;
let _temporalPlaying = false;
let _temporalTimer   = null;

function _applyTemporalFrame(t) {
  if (!_temporalActs || t >= _temporalActs.length) return;
  _temporalFrame = t;
  const regionOrder = ['visual','auditory','language','prefrontal','motor','parietal'];
  const frameStats  = {};
  regionOrder.forEach((r, i) => {
    const v = _temporalActs[t][i] ?? 0;
    frameStats[r] = { rel_activation: v, mean: v, std: 0.12, peak: Math.abs(v) };
  });
  if (window.updateLabelActivations) updateLabelActivations(frameStats);
  if (window.setBreathing) window.setBreathing(frameStats, ST.regions);
  if (window.setRegionGlow) window.setRegionGlow(frameStats, ST.regions);
  const scrubber = document.getElementById('temporalScrubber');
  if (scrubber) scrubber.value = t;
  const lbl = document.getElementById('temporalFrameLbl');
  if (lbl) lbl.textContent = 'TR ' + (t + 1) + ' / ' + _temporalActs.length;
}

function scrubTemporal(val) {
  clearInterval(_temporalTimer);
  _temporalPlaying = false;
  const btn = document.getElementById('vt-temporal');
  if (btn) { btn.classList.remove('on'); btn.textContent = '\u25B6 TR'; }
  _applyTemporalFrame(val);
}

function playTemporal() {
  if (!_temporalActs) return;
  _temporalPlaying = !_temporalPlaying;
  const btn = document.getElementById('vt-temporal');
  if (btn) { btn.classList.toggle('on', _temporalPlaying); btn.textContent = _temporalPlaying ? '\u23F8 TR' : '\u25B6 TR'; }
  if (_temporalPlaying) {
    _temporalTimer = setInterval(() => {
      _applyTemporalFrame((_temporalFrame + 1) % _temporalActs.length);
    }, 200);
  } else {
    clearInterval(_temporalTimer);
    if (_lastResult) {
      if (window.updateLabelActivations) updateLabelActivations(_lastResult.region_stats);
      if (window.setBreathing) window.setBreathing(_lastResult.region_stats, ST.regions);
      if (window.setRegionGlow) window.setRegionGlow(_lastResult.region_stats, ST.regions);
    }
  }
}

function showToast(msg, ms) {

async function downloadModel(model) {
  const btn     = document.getElementById('dlBtn-' + model);
  const barWrap = document.getElementById('dlBar-' + model);
  const barFill = document.getElementById('dlBarFill-' + model);

  if (btn) btn.disabled = true;
  if (barWrap) barWrap.style.display = 'inline-block';
  showToast('Starting download: ' + model + '…', 4000);

  let jobId;
  try {
    const r = await fetch('/api/download/' + model, { method: 'POST' });
    if (r.status === 409) {
      showToast(model + ' download already in progress');
      if (btn) btn.disabled = false;
      if (barWrap) barWrap.style.display = 'none';
      return;
    }
    if (!r.ok) { throw new Error(await r.text()); }
    const d = await r.json();
    jobId = d.job_id;
  } catch (e) {
    showToast('Download failed: ' + e.message, 5000);
    if (btn) btn.disabled = false;
    if (barWrap) barWrap.style.display = 'none';
    return;
  }

  // Stream progress via WebSocket
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(proto + '://' + location.host + '/ws/jobs/' + jobId);

  ws.onmessage = (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }
    if (msg.type === 'progress') {
      if (barFill) barFill.style.width = (msg.pct || 0).toFixed(1) + '%';
    } else if (msg.type === 'done') {
      showToast('✓ ' + model + ' downloaded — encoder now active', 5000);
      if (barFill) barFill.style.width = '100%';
      setTimeout(() => {
        if (barWrap) barWrap.style.display = 'none';
        if (btn) { btn.textContent = '✓ loaded'; btn.disabled = true; }
        fetchModelInfo();   // refresh encoder status dots
      }, 1200);
    } else if (msg.type === 'error') {
      showToast('Download error: ' + msg.message, 6000);
      if (btn) btn.disabled = false;
      if (barWrap) barWrap.style.display = 'none';
    }
  };

  ws.onerror = () => {
    showToast('WebSocket error tracking ' + model + ' download', 4000);
    if (btn) btn.disabled = false;
  };

  ws.onclose = (ev) => {
    if (!ev.wasClean) {
      showToast('Connection lost tracking ' + model + ' download', 5000);
      if (btn) btn.disabled = false;
      if (barWrap) barWrap.style.display = 'none';
    }
  };
}

function _showComparison(a, b) {
  const panel = document.getElementById('comparePanel');
  panel.style.display = '';
  const stimA = document.getElementById('cpStimA');
  const stimB = document.getElementById('cpStimB');
  if (stimA) stimA.textContent = a.modality || 'A';
  if (stimB) stimB.textContent = b.modality || 'B';

  const rows = document.getElementById('cpRows');
  if (!rows) return;
  const rois = ['visual','auditory','language','prefrontal','motor','parietal'];
  rows.innerHTML = rois.map(r => {
    const sa = a.region_stats?.[r], sb = b.region_stats?.[r];
    const va = sa?.rel_activation ?? 0, vb = sb?.rel_activation ?? 0;
    const delta = vb - va;
    const fmt = v => (v >= 0 ? '+' : '') + v.toFixed(3);
    const cls = v => v > 0.15 ? 'pos' : v < -0.15 ? 'neg' : '';
    return `<div class="cp-row">
      <span class="cp-name"><span class="cp-dot" style="background:${_REGION_COLORS[r]}"></span>${r[0].toUpperCase()+r.slice(1)}</span>
      <span class="cp-val ${cls(va)}">${fmt(va)}</span>
      <span class="cp-val ${cls(vb)}">${fmt(vb)}</span>
      <span class="cp-val ${cls(delta)}">${fmt(delta)}</span>
    </div>`;
  }).join('');

  // Auto-activate diff on brain
  if (!_diffActive) { _diffActive = true; const btn = document.getElementById('vt-diff'); if (btn) btn.classList.add('diff-on'); }
  if (window.setDiffColors) window.setDiffColors(a.region_stats, b.region_stats);
}

// ── WebSocket connection ──────────────────────────────────────
let _ws = null;
let _wsReady = false;
let _predRunning = false;

function _connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  _ws = new WebSocket(`${proto}://${location.host}/ws`);
  _ws.onopen  = () => { _wsReady = true; };
  _ws.onclose = () => { _wsReady = false; setTimeout(_connectWS, 2000); };
  _ws.onerror = () => { _ws.close(); };
  _ws.onmessage = e => {
    try { _handleWSMsg(JSON.parse(e.data)); } catch(ex) { console.warn('[tribe] ws parse error', ex); }
  };
}
_connectWS();

function _handleWSMsg(msg) {
  const bar = document.getElementById('inferBar');
  const lbl = document.getElementById('inferStepLabel');
  if (msg.type === 'progress') {
    if (bar) _animateBar(bar, msg.pct, 300);
    if (msg.pct != null) {
      document.getElementById('inferFill').style.width = msg.pct + '%';
    }
    if (lbl && msg.msg) {
      lbl.textContent = msg.msg + (msg.pct < 100 ? ' · ' + msg.pct + '%' : '');
      lbl.classList.add('visible');
    }
  } else if (msg.type === 'result') {
    if (bar) _animateBar(bar, 100, 150);
    _applyResult(msg);
    _predRunning = false;
    _setStatus(false);
    _setRunning(false);
    setTimeout(() => { if (bar) bar.style.width = '0%'; }, 500);
  } else if (msg.type === 'error') {
    console.error('[tribe] server error:', msg.message);
    _predRunning = false;
    _setStatus(false);
    _setRunning(false);
    setTimeout(() => { if (bar) bar.style.width = '0%'; }, 300);
  }
}

async function _getFileb64() {
  const file = _currentFile;
  if (!file) return '';
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result.split(',')[1] || '');
    reader.readAsDataURL(file);
  });
}

async function runPrediction() {
  if (_predRunning) return;
  const text = document.getElementById('textInput').value.trim();
  if (ST.stim === 'text' && !text) return;
  if (ST.stim === 'audio' && !_currentFile) return;
  if (ST.stim === 'image' && !_currentFile) return;
  if (ST.stim === 'video') {
    showToast('Video encoder not available — use text, image, or audio.');
    return;
  }

  _predRunning = true;
  _setStatus(true);
  _setRunning(true);
  const bar = document.getElementById('inferBar');
  if (bar) { bar.style.width = '0%'; _animateBar(bar, 8, 200); }

  const payload = { seq_len: seqLen };
  if (ST.stim === 'audio') {
    payload.audio_b64 = await _getFileb64();
  } else if (ST.stim === 'image') {
    payload.image_b64 = await _getFileb64();
  } else {
    payload.text = text || ST.stim;
  }

  if (_wsReady) {
    _ws.send(JSON.stringify(payload));
  } else {
    // Fallback to HTTP if WebSocket not connected
    try {
      const resp = await fetch('/api/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();
      if (bar) _animateBar(bar, 100, 150);
      _applyResult(data);
    } catch (err) {
      console.error('[tribe] predict error:', err.message);
    } finally {
      _predRunning = false;
      _setStatus(false);
      _setRunning(false);
      setTimeout(() => { if (bar) bar.style.width = '0%'; }, 500);
    }
  }
}

      });
      // Update image panel encoder label
      const imgLbl = document.getElementById('imageEncoderLabel');

      // Show download buttons for encoders that are not loaded
      const showDl = (model, rowId, loaded) => {

        const row = document.getElementById(rowId);
        if (btn) btn.style.display = loaded ? 'none' : '';
        if (row) row.style.display = loaded ? 'none' : '';
      };

      const clipLoaded = d.encoders?.image?.includes('loaded') || false;
      const textLoaded = d.encoders?.text?.includes('loaded')  || false;
      const audLoaded  = d.encoders?.audio?.includes('loaded') || false;

      showDl('clip',    null,           clipLoaded);
      showDl('llama',   'rowDlLlama',   textLoaded);
      showDl('wav2vec', 'rowDlWav2vec', audLoaded);
    }
  } catch(_) {}
}

// ── DRAG-AND-DROP on #inputRow ────────────────────────────────
const inputRow = document.getElementById('inputRow');
if (inputRow) {

    e.preventDefault();
    inputRow.classList.add('drag-over');
  });
  inputRow.addEventListener('dragleave', () => inputRow.classList.remove('drag-over'));

  });
}

init();

<!-- THREE.JS 3D BRAIN -->
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { OBJLoader }     from 'three/addons/loaders/OBJLoader.js';

// ── Region classification in normalised MNI space ────────────
function getRegion(x,y,z){
  if (y < -0.74) return 'visual';
  if (y >  0.64) return 'prefrontal';
  if (z >  0.40 && y > -0.22 && y < 0.58) return 'motor';
  if (z >  0.07 && y < -0.22 && y > -0.74) return 'parietal';
  if (Math.abs(x) > 0.38 && y > -0.45 && y < 0.38 && z > -0.33 && z < 0.07) return 'auditory';
  return 'language';
}

const REGION_HEX={visual:0xFF5252,auditory:0xFF9142,language:0x4F8EFF,prefrontal:0x3ECF70,motor:0xCC5CFF,parietal:0xFFD042};
// Mirrors Python REGION_RANGES in inference_server.py
const REGION_RANGES_JS = {
  visual:     [0,     3600],
  auditory:   [3600,  6800],
  language:   [6800,  10500],
  prefrontal: [10500, 14000],
  motor:      [14000, 17200],
  parietal:   [17200, 20484],
};
const BASE_COL={r:0.56,g:0.50,b:0.48};
const ALL_R=['visual','auditory','language','prefrontal','motor','parietal'];
const regionVerts={}, regionCentroids={};

// ── Procedural fallback ───────────────────────────────────────
function vnoise(x,y,z){
  const ix=Math.floor(x),iy=Math.floor(y),iz=Math.floor(z);
  const fx=x-ix,fy=y-iy,fz=z-iz;
  const s=t=>t*t*(3-2*t);
  const ux=s(fx),uy=s(fy),uz=s(fz);
  const h=(a,b,c)=>{let n=Math.sin(a*127.1+b*311.7+c*74.7)*43758.5453;return n-Math.floor(n);};
  return (1-uz)*((1-uy)*((1-ux)*h(ix,iy,iz)+ux*h(ix+1,iy,iz))+uy*((1-ux)*h(ix,iy+1,iz)+ux*h(ix+1,iy+1,iz)))+
            uz*((1-uy)*((1-ux)*h(ix,iy,iz+1)+ux*h(ix+1,iy,iz+1))+uy*((1-ux)*h(ix,iy+1,iz+1)+ux*h(ix+1,iy+1,iz+1)));
}
function fbm(x,y,z,o=5){let v=0,a=0.5,f=1;for(let i=0;i<o;i++){v+=a*(vnoise(x*f,y*f,z*f)*2-1);a*=0.5;f*=2.15;}return v;}
function ridgeFBM(x,y,z,o=4){let v=0,a=0.5,f=1;for(let i=0;i<o;i++){v+=a*(1-Math.abs(vnoise(x*f,y*f,z*f)*2-1));a*=0.5;f*=2.2;}return v;}

function buildProceduralGeo(){
  const geo=new THREE.IcosahedronGeometry(1,6);
  const pos=geo.attributes.position, N=pos.count;
  const col=new Float32Array(N*3);
  ALL_R.forEach(r=>{regionVerts[r]=[];regionCentroids[r]=new THREE.Vector3();});
  for(let i=0;i<N;i++){
    let x=pos.getX(i),y=pos.getY(i),z=pos.getZ(i);
    const len=Math.sqrt(x*x+y*y+z*z);
    const nx=x/len,ny=y/len,nz=z/len;
    const region=getRegion(nx*0.96, ny*1.2, nz*0.87);
    regionVerts[region].push(i);
    const sx=1.25,sy=1.0,sz=1.4;
    const bx=nx*sx,by=ny*sy,bz=nz*sz;
    const blen=Math.sqrt(bx*bx+by*by+bz*bz);
    const d=blen*(1+fbm(nx*2.8,ny*2.8,nz*2.8,4)*0.18+fbm(nx*6+1.3,ny*6+2.1,nz*6+0.7,3)*0.09
      +ridgeFBM(nx*11+4.1,ny*11+3.7,nz*11+5.2,3)*0.06
      -0.09*Math.exp(-Math.pow(nz*5.5,2))*Math.max(0,ny)
      -0.07*Math.exp(-Math.pow((ny+0.08)*7,2))*(1-Math.abs(nz)*.5)
      -0.04*Math.exp(-Math.pow(nx*12,2)));
    const dx=(d/blen)*bx,dy=(d/blen)*by,dz=(d/blen)*bz;
    pos.setXYZ(i,dx,dy,dz);
    regionCentroids[region].add(new THREE.Vector3(dx,dy,dz));
    col[i*3]=BASE_COL.r;col[i*3+1]=BASE_COL.g;col[i*3+2]=BASE_COL.b;
  }
  ALL_R.forEach(r=>{const n=regionVerts[r].length;if(n>0)regionCentroids[r].divideScalar(n);});
  geo.setAttribute('color',new THREE.BufferAttribute(col,3));
  geo.computeVertexNormals();
  return geo;
}

// ── Scene setup ───────────────────────────────────────────────
const canvas   = document.getElementById('brainCanvas');
const renderer = new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.outputColorSpace=THREE.SRGBColorSpace;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.15;

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x06080E);
scene.fog=new THREE.FogExp2(0x06080E,0.06);

const camera=new THREE.PerspectiveCamera(40,1,0.1,100);
camera.position.set(0,0.3,5.4);
camera.lookAt(0,0,0);

const controls=new OrbitControls(camera,renderer.domElement);
controls.enablePan=false;controls.minDistance=3.2;controls.maxDistance=9;
controls.autoRotate=true;controls.autoRotateSpeed=0.4;
controls.enableDamping=true;controls.dampingFactor=0.08;

scene.add(new THREE.AmbientLight(0xffeedd,0.4));
const sun=new THREE.DirectionalLight(0xfff8f0,1.4);sun.position.set(3.5,4,5);scene.add(sun);
const fill=new THREE.DirectionalLight(0x6699cc,0.4);fill.position.set(-3,-1,2);scene.add(fill);
scene.add(new THREE.HemisphereLight(0x223355,0x331100,0.4));

// ── State vars ────────────────────────────────────────────────
let brain=null, colAttr, colCur, colTgt;
const glowMeshes={}, regionLights={}, ptSystems={};
const PCNT=120;
let activeRegions=['visual'];
let brainReady=false;
const regionBreath={};
ALL_R.forEach(r=>{ regionBreath[r]={amp:0,freq:0.9,phase:Math.random()*Math.PI*2}; });

const regionGlow={};
ALL_R.forEach(r=>{ regionGlow[r]={opacityTarget:0.08,intensityTarget:0.4}; });

window.setRegionGlow=function(regionStats, activeRegs){
  ALL_R.forEach(r=>{
    const s=regionStats&&regionStats[r];
    const active=s&&activeRegs.includes(r);
    if(!active){regionGlow[r]={opacityTarget:0,intensityTarget:0};return;}
    const rel=s.rel_activation??0;
    regionGlow[r]={
      opacityTarget:  Math.max(0.04, Math.min(0.40, 0.12 + rel * 0.35)),
      intensityTarget:Math.max(0.2,  Math.min(3.5,  1.2 + rel * 2.0)),
    };
  });
};

window.setBreathing=function(regionStats, activeRegs){
  ALL_R.forEach(r=>{
    const s=regionStats&&regionStats[r];
    const active=s&&activeRegs.includes(r);
    const rel=active?(s.rel_activation??0):0;
    regionBreath[r]={
      amp:  active?Math.max(0.06,Math.min(0.30,0.10+rel*0.40)):0,
      freq: active?0.7+Math.max(0,rel)*0.8:0.8,
      phase:regionBreath[r].phase,
    };
  });
};
let lastInteract=Date.now();
let vertMNI=null;
let vertRegion=null;
let vertYMin=0, vertYMax=1;

// Label overlay
const labelCtr=document.getElementById('regionLabels');
const labelLines=document.getElementById('labelLines');
const labelEls={};
const lineSvg={};
const RNAMES_DISPLAY={
  visual:'Visual Cortex', auditory:'Auditory Cortex', language:'Language',
  prefrontal:'Prefrontal', motor:'Motor Cortex', parietal:'Parietal',
};
ALL_R.forEach(r=>{
  const c=new THREE.Color(REGION_HEX[r]);
  const rgb=`rgb(${Math.round(c.r*255)},${Math.round(c.g*255)},${Math.round(c.b*255)})`;

  const el=document.createElement('div'); el.className='rlabel-3d'; el.style.opacity='0';
  el.innerHTML=`
    <div class="rl-head">
      <div class="rl-dot" style="background:${rgb}"></div>
      <span class="rl-name">${RNAMES_DISPLAY[r]||r.toUpperCase()}</span>
    </div>
    <div class="rl-bar-wrap"><div class="rl-bar-fill" id="rlbar-${r}" style="background:${rgb}"></div></div>
    <div class="rl-val" id="rlval-${r}">—</div>
    <div class="rl-detail" id="rldetail-${r}"></div>`;
  labelCtr.appendChild(el); labelEls[r]=el;

  const line=document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('stroke',rgb); line.setAttribute('stroke-width','1');
  line.setAttribute('stroke-opacity','0.45'); line.setAttribute('stroke-dasharray','3 3');
  line.style.display='none';
  labelLines.appendChild(line); lineSvg[r]=line;
});

// ── Post-load geometry setup ──────────────────────────────────
function resetPt(ps,i){
  const sp=0.38;
  ps.pos[i*3]=ps.ctr.x+(Math.random()-.5)*sp;
  ps.pos[i*3+1]=ps.ctr.y+(Math.random()-.5)*sp;
  ps.pos[i*3+2]=ps.ctr.z+(Math.random()-.5)*sp;
  ps.vel[i*3]=(Math.random()-.5)*0.004;
  ps.vel[i*3+1]=0.003+Math.random()*0.006;
  ps.vel[i*3+2]=(Math.random()-.5)*0.004;
  ps.life[i]=Math.random();
}

function onGeoReady(geo, isReal){
  const pos=geo.attributes.position, N=pos.count;
  vertMNI=new Float32Array(N*3);
  vertRegion=new Array(N);
  vertYMin=Infinity; vertYMax=-Infinity;
  ALL_R.forEach(r=>{regionVerts[r]=[];regionCentroids[r]=new THREE.Vector3();});
  const col=new Float32Array(N*3);
  for(let i=0;i<N;i++){
    const x=pos.getX(i),y=pos.getY(i),z=pos.getZ(i);
    vertMNI[i*3]=x; vertMNI[i*3+1]=y; vertMNI[i*3+2]=z;
    if(y<vertYMin)vertYMin=y; if(y>vertYMax)vertYMax=y;
    const region=getRegion(x,y,z);
    vertRegion[i]=region;
    regionVerts[region].push(i);
    regionCentroids[region].add(new THREE.Vector3(x,y,z));
    col[i*3]=BASE_COL.r;col[i*3+1]=BASE_COL.g;col[i*3+2]=BASE_COL.b;
  }
  ALL_R.forEach(r=>{const n=regionVerts[r].length;if(n>0)regionCentroids[r].divideScalar(n);});
  // Precompute each vertex's ordinal rank within its region for O(1) model-vertex lookup
  const _rankArr   = new Int32Array(N);
  const _regCntMap = {};
  ALL_R.forEach(r => { _regCntMap[r] = 0; });
  for (let vi = 0; vi < N; vi++) {
    const r = vertRegion[vi];
    _rankArr[vi] = _regCntMap[r]++;
  }
  window._vertRankInRegion = _rankArr;
  window._regionVertCount  = _regCntMap;
  geo.setAttribute('color',new THREE.BufferAttribute(col,3));

  brain=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({vertexColors:true,roughness:0.76,metalness:0,side:THREE.DoubleSide}));
  if(isReal){ brain.rotation.x=-Math.PI/2; } else { brain.rotation.y=Math.PI*0.1; }
  scene.add(brain);

  const rotM=new THREE.Matrix4().makeRotationFromEuler(brain.rotation);
  ALL_R.forEach(r=>{
    const worldCtr=regionCentroids[r].clone().applyMatrix4(rotM);
    const gm=new THREE.Mesh(new THREE.SphereGeometry(0.28,12,12),
      new THREE.MeshBasicMaterial({color:REGION_HEX[r],transparent:true,opacity:0,depthWrite:false,blending:THREE.AdditiveBlending}));
    gm.position.copy(worldCtr);scene.add(gm);glowMeshes[r]=gm;
    const rl=new THREE.PointLight(REGION_HEX[r],0,2.5);rl.position.copy(worldCtr);scene.add(rl);regionLights[r]=rl;
    const ppos=new Float32Array(PCNT*3),vel=new Float32Array(PCNT*3),life=new Float32Array(PCNT);
    const pg=new THREE.BufferGeometry();pg.setAttribute('position',new THREE.BufferAttribute(ppos,3));
    const pm=new THREE.PointsMaterial({color:REGION_HEX[r],size:0.022,transparent:true,opacity:0,depthWrite:false,blending:THREE.AdditiveBlending});
    const pts=new THREE.Points(pg,pm);scene.add(pts);
    ptSystems[r]={pts,pos:ppos,vel,life,ctr:worldCtr};
    for(let i=0;i<PCNT;i++)resetPt(ptSystems[r],i);
  });

  colAttr=geo.attributes.color;
  colCur=new Float32Array(N*3);colTgt=new Float32Array(N*3);
  for(let i=0;i<N;i++){colCur[i*3]=colTgt[i*3]=BASE_COL.r;colCur[i*3+1]=colTgt[i*3+1]=BASE_COL.g;colCur[i*3+2]=colTgt[i*3+2]=BASE_COL.b;}

  brainReady=true;
  const lo=document.getElementById('brainLoading');if(lo)lo.style.display='none';
  const lov=document.getElementById('loadingOverlay');if(lov)lov.style.display='none';
  window.updateBrainRegions(activeRegions);
}

function setRegionTarget(r,active){
  const c=REGION_RGB[r]||new THREE.Color(REGION_HEX[r]);
  const op=active?0.55:0;
  const dim=active?1:0.38;
  regionVerts[r].forEach(i=>{
    colTgt[i*3  ]=BASE_COL.r*dim*(1-op)+c.r*op;
    colTgt[i*3+1]=BASE_COL.g*dim*(1-op)+c.g*op;
    colTgt[i*3+2]=BASE_COL.b*dim*(1-op)+c.b*op;
  });
}

function updateLabels(active){
  if(!brain)return;
  const v3=new THREE.Vector3();
  const rect=canvas.getBoundingClientRect();
  ALL_R.forEach(r=>{
    const el=labelEls[r];
    const on=active.includes(r);
    if(!on){el.style.opacity='0';return;}
    v3.copy(regionCentroids[r]).applyMatrix4(brain.matrixWorld);
    const pr=v3.clone().project(camera);
    if(pr.z>=1){el.style.opacity='0';return;}
    const px=(pr.x*.5+.5)*rect.width, py=(-pr.y*.5+.5)*rect.height;
    el.style.left=px+'px'; el.style.top=py+'px'; el.style.opacity='1';
  });
}

window.updateLabelActivations=function updateLabelActivations(regionStats){
  ALL_R.forEach(r=>{
    const s=regionStats&&regionStats[r];
    const rel=s?s.rel_activation??0:null;
    const bar=document.getElementById('rlbar-'+r);
    const val=document.getElementById('rlval-'+r);
    const det=document.getElementById('rldetail-'+r);
    if(!bar||!val)return;
    if(rel===null){
      bar.style.width='0%';
      val.textContent='—'; val.className='rl-val';
      if(det)det.textContent='';
      return;
    }
    const pct=Math.round(Math.max(0,Math.min(1,(rel+0.5)/1.5))*100);
    bar.style.width=pct+'%';
    val.textContent=(rel>=0?'+':'')+rel.toFixed(2)+'σ';
    val.className='rl-val '+(rel>=0.15?'pos':rel<=-0.15?'neg':'');
    if(det&&s){
      const mn=(s.mean>=0?'+':'')+s.mean.toFixed(3);
      const pk=s.peak!=null?s.peak.toFixed(3):'—';
      det.textContent=`μ ${mn}  σ ${s.std.toFixed(3)}  pk ${pk}`;
    }
  });
};

// MNI coordinate readout
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
renderer.domElement.addEventListener('mousemove',e=>{
  if(!brain)return;
  const r=canvas.getBoundingClientRect();
  mouse.x=(e.clientX-r.left)/r.width*2-1;
  mouse.y=-((e.clientY-r.top)/r.height)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObject(brain);
  if(hits.length>0){
    const p=hits[0].point.clone().applyMatrix4(brain.matrixWorld.clone().invert());
    const sc=182.4/2.4;
    const mx=Math.round(p.x*sc), my=Math.round(p.y*sc), mz=Math.round(p.z*sc);
    document.getElementById('mniCoord').textContent=mx+', '+my+', '+mz;
  }
});

// ── Window API ────────────────────────────────────────────────
const activationLevels = {visual:1,auditory:1,language:1,prefrontal:1,motor:1,parietal:1};

window.updateBrainRegions=function(regions){
  activeRegions=regions;
  if(!brainReady)return;
  ALL_R.forEach(r=>setRegionTarget(r,regions.includes(r)));
  ALL_R.forEach(r=>{ptSystems[r].pts.material.opacity=regions.includes(r)?.9:0;});
};

window.setBrainActivations=function(levels){
  Object.assign(activationLevels, levels);
  if(!brainReady) return;
  ALL_R.forEach(r=>{
    const lv = activationLevels[r] ?? 1;
    const c  = new THREE.Color(REGION_HEX[r]);
    if(activeRegions.includes(r)){
      regionVerts[r].forEach(i=>{
        colTgt[i*3]   = BASE_COL.r + (c.r - BASE_COL.r) * lv;
        colTgt[i*3+1] = BASE_COL.g + (c.g - BASE_COL.g) * lv;
        colTgt[i*3+2] = BASE_COL.b + (c.b - BASE_COL.b) * lv;
      });
    } else {
      regionVerts[r].forEach(i=>{
        colTgt[i*3]=BASE_COL.r; colTgt[i*3+1]=BASE_COL.g; colTgt[i*3+2]=BASE_COL.b;
      });
    }
  });
};

const REGION_RGB={};
ALL_R.forEach(r=>{const c=new THREE.Color(REGION_HEX[r]);REGION_RGB[r]={r:c.r,g:c.g,b:c.b};});

// ── BOLD-style colormap: negative=blue suppression, positive=warm activation ──
// t ∈ [-1, +1] → {r, g, b} in [0,1]
function boldColormap(t){
  const b=BASE_COL;
  if(t<0){
    const s=Math.min(1,-t);
    return {r:b.r*(1-s)+0.08*s, g:b.g*(1-s)+0.14*s, b:b.b*(1-s)+0.62*s};
  } else {
    const s=Math.min(1,t);
    if(s<0.5){
      const u=s*2;
      return {r:b.r*(1-u)+0.90*u, g:b.g*(1-u)+0.72*u, b:b.b*(1-u)+0.10*u};
    } else {
      const u=(s-0.5)*2;
      return {r:0.90*(1-u)+0.82*u, g:0.72*(1-u)+0.18*u, b:0.10*(1-u)+0.06*u};
    }
  }
}

// Deterministic per-vertex noise in [-1,+1] from vertex index
function vertexNoise(i){
  const x=Math.sin(i*127.1+3.7)*43758.5453;
  const y=Math.sin(i*311.7+1.3)*23421.6312;
  return ((x-Math.floor(x))+(y-Math.floor(y)))*0.5*2-1;
}

window.setBrainVertexSample = function(vertexActs, gMin, gMax, activeRegs, regionStats) {
  if (!brainReady || !vertRegion) return;
  const N         = colTgt.length / 3;
  const range     = Math.max(Math.abs(gMin), Math.abs(gMax), 0.001);
  const activeSet = new Set(activeRegs);
  const MODEL_N   = 20484;
  const rankArr   = window._vertRankInRegion;
  const regCntMap = window._regionVertCount;
  if (!rankArr || !regCntMap) return;

  for (let i = 0; i < N; i++) {
    const r = vertRegion[i];
    if (!activeSet.has(r)) {
      colTgt[i*3]   = BASE_COL.r * 0.36;
      colTgt[i*3+1] = BASE_COL.g * 0.36;
      colTgt[i*3+2] = BASE_COL.b * 0.36;
      continue;
    }
    // Map mesh vertex rank -> model vertex index proportionally within region
    const lo  = REGION_RANGES_JS[r][0];
    const hi  = REGION_RANGES_JS[r][1];
    const cnt = regCntMap ? (regCntMap[r] || 1) : 1;
    const modelIdx = lo + Math.floor((rankArr[i] / cnt) * (hi - lo));
    const act = vertexActs[Math.min(modelIdx, MODEL_N - 1)] ?? 0;
    const t   = Math.max(-1, Math.min(1, act / range));
    const c   = boldColormap(t);
    colTgt[i*3]   = c.r;
    colTgt[i*3+1] = c.g;
    colTgt[i*3+2] = c.b;
  }
};

window.setCameraView=function(view){
  const d=5.4;
  const P={lateral:[0,.3,d],medial:[0,.3,-d],dorsal:[0,d,.5]};
  const p=P[view];if(!p)return;
  camera.position.set(p[0],p[1],p[2]);camera.lookAt(0,0,0);
  controls.target.set(0,0,0);controls.update();lastInteract=Date.now();
};
window.setHemisphere=function(hem){
  const d=5.4;
  if(hem==='left')       camera.position.set( d,.3,1.2);
  else if(hem==='right') camera.position.set(-d,.3,1.2);
  else                   camera.position.set( 0,.3, d);
  camera.lookAt(0,0,0);controls.target.set(0,0,0);controls.update();lastInteract=Date.now();
};
// Colour brain by (B − A) rel_activation with diverging BOLD map + per-vertex noise
window.setDiffColors=function(statsA, statsB){
  if(!brainReady||!vertRegion)return;
  const MAX_DIFF=2.0;
  const N=colTgt.length/3;
  for(let i=0;i<N;i++){
    const r=vertRegion[i];
    const a=statsA?.[r]?.rel_activation??0;
    const b=statsB?.[r]?.rel_activation??0;
    const std=Math.min((statsB?.[r]?.std??0.15),0.45);
    const delta=Math.max(-MAX_DIFF,Math.min(MAX_DIFF,b-a))/MAX_DIFF;
    const noise=vertexNoise(i)*std*0.4;
    const t=Math.max(-1,Math.min(1,delta+noise));
    const c=boldColormap(t);
    colTgt[i*3]=c.r; colTgt[i*3+1]=c.g; colTgt[i*3+2]=c.b;
  }
  if(colAttr)colAttr.needsUpdate=true;
};

window.toggleROIGlow=function(show){
  if(!brainReady)return;
  ALL_R.forEach(r=>{glowMeshes[r].visible=show;regionLights[r].visible=show;ptSystems[r].pts.visible=show;});
};
window.toggleBrainLabels=function(show){
  ALL_R.forEach(r=>{
    labelEls[r].style.display=show?'':'none';
    lineSvg[r].style.display=show?'':'none';
  });
};

controls.addEventListener('start',()=>{controls.autoRotate=false;lastInteract=Date.now();});
controls.addEventListener('end',()=>{lastInteract=Date.now();});

const clock=new THREE.Clock();
const LERP = 0.10;

function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta(),t=clock.elapsedTime;
  if(!controls.autoRotate&&Date.now()-lastInteract>4000)controls.autoRotate=true;
  controls.update();

  if(brainReady){
    let dirty=false;
    for(let i=0;i<colAttr.count;i++){
      const dr=colTgt[i*3]-colCur[i*3],dg=colTgt[i*3+1]-colCur[i*3+1],db=colTgt[i*3+2]-colCur[i*3+2];
      if(Math.abs(dr)>.0008||Math.abs(dg)>.0008||Math.abs(db)>.0008){
        colCur[i*3]+=dr*LERP;colCur[i*3+1]+=dg*LERP;colCur[i*3+2]+=db*LERP;
        colAttr.array[i*3]=colCur[i*3];colAttr.array[i*3+1]=colCur[i*3+1];colAttr.array[i*3+2]=colCur[i*3+2];
        dirty=true;
      }
    }
    if(dirty)colAttr.needsUpdate=true;

    if(vertRegion){
      let breathDirty=false;
      for(let i=0;i<colAttr.count;i++){
        const b=regionBreath[vertRegion[i]];
        if(!b||b.amp===0)continue;
        const pulse=b.amp*Math.sin(2*Math.PI*b.freq*t+b.phase);
        colAttr.array[i*3  ]=Math.min(1,Math.max(0,colCur[i*3  ]*(1+pulse)));
        colAttr.array[i*3+1]=Math.min(1,Math.max(0,colCur[i*3+1]*(1+pulse)));
        colAttr.array[i*3+2]=Math.min(1,Math.max(0,colCur[i*3+2]*(1+pulse)));
        breathDirty=true;
      }
      if(breathDirty)colAttr.needsUpdate=true;
    }

    ALL_R.forEach((r,idx)=>{
      const on=activeRegions.includes(r);
      const gl=regionGlow[r];
      const gm=glowMeshes[r].material;
      const pulse=0.03*Math.sin(t*2.1+idx);
      const tgtOp=on?(gl.opacityTarget+pulse):0;
      gm.opacity+=(tgtOp-gm.opacity)*0.07;
      const lv = activationLevels[r] ?? 1;
      const baseScale = 1.0 + Math.max(0, lv - 0.5) * 0.5;
      glowMeshes[r].scale.setScalar(baseScale + 0.06 * Math.sin(t * 1.9 + idx * 1.2));
      const rl=regionLights[r];
      const tgtInt = on ? (gl.intensityTarget * (0.4 + lv * 0.6) + 0.15 * Math.sin(t * 2.3 + idx * .8)) : 0;
      rl.intensity+=(tgtInt-rl.intensity)*0.06;
    });

    ALL_R.forEach(r=>{
      if(!activeRegions.includes(r))return;
      const ps=ptSystems[r];
      for(let i=0;i<PCNT;i++){
        ps.life[i]+=dt*.65;if(ps.life[i]>1)resetPt(ps,i);
        ps.pos[i*3]+=ps.vel[i*3];ps.pos[i*3+1]+=ps.vel[i*3+1];ps.pos[i*3+2]+=ps.vel[i*3+2];
      }
      ps.pts.geometry.attributes.position.array.set(ps.pos);
      ps.pts.geometry.attributes.position.needsUpdate=true;
    });

    updateLabels(activeRegions);
  }

  renderer.render(scene,camera);
}

function resize(){
  const p=canvas.parentElement,w=p.clientWidth,h=p.clientHeight;
  renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();
}
window.addEventListener('resize',resize);
new ResizeObserver(resize).observe(canvas.parentElement);
resize();
animate();

const blFill=document.getElementById('blFill');
const blPct =document.getElementById('blPct');

new OBJLoader().load('/brain.obj',
  (obj)=>{
    const child=obj.children.find(c=>c.isMesh)||obj.children[0];
    if(!child?.geometry){onGeoReady(buildProceduralGeo(),false);return;}
    const geo=child.geometry;
    geo.computeBoundingBox();
    const box=geo.boundingBox;
    const ctr=box.getCenter(new THREE.Vector3());
    const sz=box.getSize(new THREE.Vector3());
    const sc=2.4/Math.max(sz.x,sz.y,sz.z);
    geo.translate(-ctr.x,-ctr.y,-ctr.z);
    geo.scale(sc,sc,sc);
    geo.computeVertexNormals();
    onGeoReady(geo,true);
  },
  (xhr)=>{
    if(xhr.total>0){
      const pct=Math.round(xhr.loaded/xhr.total*100);
      if(blFill)blFill.style.width=pct+'%';
      if(blPct)blPct.textContent=pct+'%';
    }
  },
  (err)=>{
    console.warn('brain.obj load failed, using procedural fallback.',err);
    const lo=document.getElementById('brainLoading');
    if(lo){const lbl=lo.querySelector('.bl-label');if(lbl)lbl.textContent='Using procedural model';}
    const lov=document.getElementById('loadingOverlay');if(lov)lov.style.display='none';
    onGeoReady(buildProceduralGeo(),false);
  }
);
</script>
